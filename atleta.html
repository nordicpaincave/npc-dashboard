<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0e17">
<title>NPC Endurance · Área do Atleta</title>
<style>
:root{--ice:#4a9bbe;--ice-l:rgba(74,155,190,.12);--fire:#e85d24;--dark:#0a0e17;--dark2:#0f1520;--dark3:#141b2d;--text:#c8d8e8;--text2:#7a9ab8;--text3:#4a6278;--border:rgba(74,155,190,.15)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--dark);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2rem;padding:1.5rem;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 50% -5%,rgba(74,155,190,.07),transparent);pointer-events:none}
.brand{text-align:center;position:relative}
.dot{width:14px;height:14px;border-radius:50%;background:var(--ice);box-shadow:0 0 10px var(--ice);margin:0 auto .75rem;animation:pulse 2.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.title{font-size:1.2rem;font-weight:700;color:var(--ice);letter-spacing:.08em}
.sub{font-size:.75rem;color:var(--text3);margin-top:.25rem}
.card{background:var(--dark2);border:1px solid var(--border);border-radius:14px;padding:1.75rem 1.5rem;width:100%;max-width:300px;position:relative}
.card-label{font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:.09em;text-align:center;margin-bottom:1.25rem}
.dots{display:flex;justify-content:center;gap:1.1rem;margin-bottom:1.5rem}
.dot-pin{width:16px;height:16px;border-radius:50%;background:rgba(74,155,190,.1);border:2px solid var(--text3);transition:all .15s}
.dot-pin.on{background:var(--ice);border-color:var(--ice);box-shadow:0 0 7px rgba(74,155,190,.5)}
.dot-pin.err{background:var(--fire);border-color:var(--fire)}
.keys{display:grid;grid-template-columns:repeat(3,1fr);gap:.55rem}
.key{background:var(--dark3);border:1px solid rgba(74,155,190,.1);border-radius:10px;color:var(--text);font-size:1.25rem;font-weight:600;padding:.85rem;cursor:pointer;transition:all .1s;user-select:none;-webkit-user-select:none;text-align:center}
.key:active,.key:focus{background:var(--ice-l);border-color:var(--ice);transform:scale(.94);outline:none}
.key-del{color:var(--text2);font-size:1rem}
.key-0{grid-column:2}
.error{text-align:center;font-size:.78rem;color:var(--fire);margin-top:.8rem;min-height:1.1em}
.back-link{font-size:.75rem;color:var(--text3);text-decoration:none;transition:color .2s;margin-top:-.5rem}
.back-link:hover{color:var(--text2)}
</style>
</head>
<body>
<div class="brand">
  <div class="dot"></div>
  <div class="title">NPC ENDURANCE</div>
  <div class="sub">Área do Atleta</div>
</div>
<div class="card">
  <div class="card-label">Digite seu PIN de 4 dígitos</div>
  <div class="dots">
    <div class="dot-pin" id="d0"></div>
    <div class="dot-pin" id="d1"></div>
    <div class="dot-pin" id="d2"></div>
    <div class="dot-pin" id="d3"></div>
  </div>
  <div class="keys">
    <button class="key" onclick="press('1')">1</button>
    <button class="key" onclick="press('2')">2</button>
    <button class="key" onclick="press('3')">3</button>
    <button class="key" onclick="press('4')">4</button>
    <button class="key" onclick="press('5')">5</button>
    <button class="key" onclick="press('6')">6</button>
    <button class="key" onclick="press('7')">7</button>
    <button class="key" onclick="press('8')">8</button>
    <button class="key" onclick="press('9')">9</button>
    <button class="key key-0" onclick="press('0')">0</button>
    <button class="key key-del" onclick="del()">&#9003;</button>
  </div>
  <div class="error" id="err"></div>
</div>
<a class="back-link" href="como_funciona.html">&#8592; Voltar ao início</a>
<script>
const PINS={'3060':'bruno','1590':'jean','5056':'gabriel','6470':'rafael','5861':'simony','1606':'clara'};
let pin='';
function press(d){if(pin.length>=4)return;pin+=d;document.getElementById('d'+(pin.length-1)).classList.add('on');if(pin.length===4)setTimeout(check,130)}
function del(){if(!pin.length)return;document.getElementById('d'+(pin.length-1)).classList.remove('on');pin=pin.slice(0,-1);document.getElementById('err').textContent=''}
function check(){
  const key=PINS[pin];
  if(key){sessionStorage.setItem('npc_portal_athlete',key);window.location.href='index.html'}
  else{
    for(let i=0;i<4;i++){document.getElementById('d'+i).classList.remove('on');document.getElementById('d'+i).classList.add('err')}
    document.getElementById('err').textContent='PIN incorreto. Tente novamente.';
    setTimeout(()=>{for(let i=0;i<4;i++)document.getElementById('d'+i).classList.remove('err');pin=''},700)
  }
}
document.addEventListener('keydown',e=>{if(e.key>='0'&&e.key<='9')press(e.key);else if(e.key==='Backspace')del()});
</script>
</body>
</html>
