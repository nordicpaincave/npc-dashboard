<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0e17">
<title>NPC Endurance · Atleta</title>
<style>
:root{
  --ice:#4a9bbe;--ice-l:rgba(74,155,190,.12);--ice-d:#2e7da0;
  --fire:#e85d24;--fire-l:rgba(232,93,36,.12);
  --green:#2ecc71;--green-l:rgba(46,204,113,.12);
  --amber:#f39c12;--amber-l:rgba(243,156,18,.12);
  --purple:#9b59b6;--purple-l:rgba(155,89,182,.12);
  --red:#e74c3c;--red-l:rgba(231,76,60,.12);
  --dark:#0a0e17;--dark2:#0f1520;--dark3:#141b2d;
  --text:#c8d8e8;--text2:#7a9ab8;--text3:#3d5068;
  --border:rgba(74,155,190,.15);--border2:rgba(74,155,190,.08);
  --card:rgba(15,21,32,.9);
  --radius:14px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{
  background:var(--dark);color:var(--text);
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  font-size:15px;line-height:1.5;
}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(74,155,190,.08),transparent);
  pointer-events:none;z-index:0;
}

/* ── LOGIN ── */
#login-screen{
  position:fixed;inset:0;z-index:100;
  display:flex;align-items:center;justify-content:center;
  background:var(--dark);
  flex-direction:column;gap:2rem;padding:2rem;
}
.login-logo{text-align:center}
.login-dot{
  width:16px;height:16px;border-radius:50%;
  background:var(--ice);box-shadow:0 0 12px var(--ice);
  margin:0 auto .75rem;animation:pulse 2.5s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.login-title{font-size:1.3rem;font-weight:700;color:var(--ice);letter-spacing:.06em}
.login-sub{font-size:.78rem;color:var(--text3);margin-top:.25rem}
.login-card{
  background:var(--dark2);border:1px solid var(--border);
  border-radius:var(--radius);padding:1.75rem;
  width:100%;max-width:320px;
}
.login-label{font-size:.72rem;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:1.25rem;text-align:center}
.pin-dots{display:flex;justify-content:center;gap:1rem;margin-bottom:1.5rem}
.pin-dot{
  width:18px;height:18px;border-radius:50%;
  background:var(--border);border:2px solid var(--text3);
  transition:all .15s;
}
.pin-dot.filled{background:var(--ice);border-color:var(--ice);box-shadow:0 0 8px rgba(74,155,190,.4)}
.pin-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;
}
.pin-btn{
  background:var(--dark3);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);
  font-size:1.2rem;font-weight:600;
  padding:.8rem;cursor:pointer;
  transition:all .1s;user-select:none;
  -webkit-user-select:none;
}
.pin-btn:active{background:var(--ice-l);border-color:var(--ice);transform:scale(.95)}
.pin-btn.pin-del{color:var(--text2);font-size:1rem}
.pin-btn.pin-zero{grid-column:2}
.pin-error{
  text-align:center;font-size:.8rem;color:var(--fire);
  margin-top:.75rem;height:1.2em;
  animation:shake .4s ease;
}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* ── APP SHELL ── */
#app{position:relative;z-index:1;display:none;min-height:100vh;padding-bottom:5rem}
#app.visible{display:block}

/* ── TOP BAR ── */
.topbar{
  position:sticky;top:0;z-index:50;
  background:rgba(10,14,23,.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border2);
  padding:.75rem 1.1rem;
  display:flex;align-items:center;gap:.75rem;
}
.topbar-avatar{
  width:36px;height:36px;border-radius:50%;
  background:var(--ice-l);border:2px solid var(--ice);
  display:flex;align-items:center;justify-content:center;
  font-size:.85rem;font-weight:700;color:var(--ice);flex-shrink:0;
}
.topbar-name{font-size:.95rem;font-weight:700;color:var(--text);flex:1}
.topbar-meta{font-size:.7rem;color:var(--text3)}
.topbar-logout{
  background:none;border:none;color:var(--text3);
  cursor:pointer;font-size:.75rem;padding:.3rem .6rem;
  border-radius:6px;transition:color .2s;
}
.topbar-logout:hover{color:var(--text)}

/* ── CONTENT ── */
.content{padding:1rem 1rem 0}

/* ── SECTION HEADERS ── */
.sec-title{
  font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;
  color:var(--text3);margin:1.25rem 0 .6rem;padding-left:.1rem;
}

/* ── DATE HERO ── */
.date-hero{
  background:linear-gradient(135deg,rgba(74,155,190,.08),rgba(232,93,36,.05));
  border:1px solid var(--border);border-radius:var(--radius);
  padding:1.1rem 1.25rem;
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:.5rem;
}
.date-day{font-size:1.5rem;font-weight:800;color:var(--text)}
.date-full{font-size:.78rem;color:var(--text2);margin-top:.1rem}
.date-badge{
  background:var(--ice-l);border:1px solid var(--ice);
  border-radius:20px;padding:.3rem .75rem;
  font-size:.72rem;font-weight:600;color:var(--ice);
  text-align:center;white-space:nowrap;
}

/* ── PMC CARDS ── */
.pmc-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-bottom:.5rem}
.pmc-card{
  background:var(--card);border:1px solid var(--border2);
  border-radius:var(--radius-sm);
  padding:.75rem .6rem;text-align:center;
}
.pmc-val{font-size:1.5rem;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
.pmc-lbl{font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-top:.25rem}
.pmc-delta{font-size:.7rem;margin-top:.2rem;font-weight:600}
.delta-up{color:var(--green)}.delta-dn{color:var(--fire)}.delta-nt{color:var(--text3)}

/* ── SESSION CARDS ── */
.session-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:1rem 1.1rem;
  margin-bottom:.6rem;
  position:relative;overflow:hidden;
}
.session-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;background:var(--sport-color,var(--ice));
  border-radius:2px 0 0 2px;
}
.session-top{display:flex;align-items:flex-start;gap:.75rem}
.session-sport-icon{
  width:36px;height:36px;border-radius:8px;flex-shrink:0;
  background:rgba(74,155,190,.1);
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;
}
.session-info{flex:1;min-width:0}
.session-title{font-size:.88rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.session-meta{font-size:.75rem;color:var(--text2);margin-top:.15rem}
.session-tss{
  background:var(--ice-l);border:1px solid rgba(74,155,190,.25);
  border-radius:6px;padding:.25rem .55rem;
  font-size:.72rem;font-weight:700;color:var(--ice);
  white-space:nowrap;
}
.session-zones{
  display:flex;gap:.3rem;margin-top:.65rem;
  height:6px;border-radius:3px;overflow:hidden;
}
.zone-bar{border-radius:3px;transition:width .4s}
.zone-labels{display:flex;gap:.3rem;margin-top:.3rem;font-size:.65rem;color:var(--text3)}
.zone-label{flex:1;text-align:center}
.session-empty{
  text-align:center;padding:2rem 1rem;
  color:var(--text3);font-size:.85rem;
}
.session-hrv{
  display:flex;align-items:center;gap:.3rem;
  margin-top:.5rem;font-size:.72rem;color:var(--text2);
}
.hrv-pill{
  padding:.15rem .45rem;border-radius:10px;font-weight:600;font-size:.68rem;
}

/* ── NUTRITION CARD ── */
.nutr-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:1.1rem;
  margin-bottom:.6rem;
}
.nutr-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem}
.nutr-type{
  font-size:.72rem;font-weight:700;
  padding:.25rem .6rem;border-radius:10px;
  background:var(--day-color-l,var(--ice-l));
  color:var(--day-color,var(--ice));
  border:1px solid var(--day-color,var(--ice));
  opacity:.85;
}
.nutr-kcal{font-size:.8rem;color:var(--text2)}
.nutr-kcal span{font-weight:700;color:var(--text);font-size:.95rem}
.macro-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-bottom:.8rem}
.macro-item{text-align:center}
.macro-val{font-size:1.2rem;font-weight:800;color:var(--text)}
.macro-lbl{font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-top:.1rem}
.macro-pct{font-size:.68rem;color:var(--text2)}
.nutr-tips{display:flex;flex-direction:column;gap:.35rem}
.nutr-tip{
  display:flex;align-items:flex-start;gap:.5rem;
  font-size:.77rem;color:var(--text2);line-height:1.4;
}
.nutr-tip-dot{
  width:6px;height:6px;border-radius:50%;flex-shrink:0;
  background:var(--day-color,var(--ice));margin-top:.4rem;
}
.water-row{
  display:flex;align-items:center;gap:.5rem;
  margin-top:.75rem;padding-top:.75rem;
  border-top:1px solid var(--border2);
  font-size:.8rem;color:var(--text2);
}
.water-row span{font-weight:700;color:var(--ice)}

/* ── ALERTS ── */
.alert{
  display:flex;align-items:flex-start;gap:.6rem;
  padding:.7rem .9rem;border-radius:var(--radius-sm);
  margin-bottom:.5rem;font-size:.8rem;line-height:1.4;
}
.alert-ok{background:var(--green-l);border:1px solid rgba(46,204,113,.2);color:#a8e6c0}
.alert-warn{background:var(--amber-l);border:1px solid rgba(243,156,18,.2);color:#f5ce80}
.alert-danger{background:var(--red-l);border:1px solid rgba(231,76,60,.2);color:#f5a8a2}
.alert-info{background:var(--ice-l);border:1px solid rgba(74,155,190,.2);color:#a8d4e8}
.alert-icon{font-size:.85rem;flex-shrink:0;margin-top:.05rem}

/* ── NEXT RACE ── */
.race-card{
  background:linear-gradient(135deg,rgba(232,93,36,.08),rgba(74,155,190,.06));
  border:1px solid rgba(232,93,36,.2);
  border-radius:var(--radius);padding:1.1rem;
  display:flex;align-items:center;gap:1rem;
}
.race-icon{font-size:2rem;flex-shrink:0}
.race-info{flex:1}
.race-name{font-size:.95rem;font-weight:700;color:var(--text)}
.race-date{font-size:.78rem;color:var(--text2);margin-top:.15rem}
.race-countdown{
  background:rgba(232,93,36,.12);border:1px solid rgba(232,93,36,.25);
  border-radius:8px;padding:.4rem .8rem;text-align:center;flex-shrink:0;
}
.race-weeks{font-size:1.4rem;font-weight:800;color:var(--fire);line-height:1}
.race-weeks-lbl{font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}

/* ── BOTTOM NAV ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  background:rgba(10,14,23,.95);backdrop-filter:blur(12px);
  border-top:1px solid var(--border2);
  display:flex;padding:.5rem 0 calc(.5rem + env(safe-area-inset-bottom));
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  gap:.2rem;cursor:pointer;padding:.4rem 0;
  color:var(--text3);font-size:.62rem;text-transform:uppercase;letter-spacing:.07em;
  transition:color .15s;border:none;background:none;
}
.nav-item.active,.nav-item:hover{color:var(--ice)}
.nav-icon{font-size:1.2rem}

/* ── TABS ── */
.tab-content{display:none}
.tab-content.active{display:block}

/* ── FORM VIEW ── */
.meals-list{display:flex;flex-direction:column;gap:.5rem}
.meal-row{
  background:var(--card);border:1px solid var(--border2);
  border-radius:var(--radius-sm);
  padding:.75rem 1rem;
  display:flex;align-items:center;gap:.75rem;
}
.meal-time{font-size:.72rem;color:var(--text3);width:2.5rem;flex-shrink:0;text-align:right}
.meal-name{font-size:.82rem;font-weight:600;color:var(--text);flex:1;min-width:0}
.meal-desc{font-size:.7rem;color:var(--text2);margin-top:.1rem;line-height:1.4}
.meal-macros{
  display:flex;gap:.3rem;flex-shrink:0;
  flex-direction:column;align-items:flex-end;
}
.meal-kcal{font-size:.78rem;font-weight:700;color:var(--ice)}
.meal-cpm{font-size:.65rem;color:var(--text3)}

/* ── HRV MINI CHART ── */
.hrv-chart-wrap{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:1rem;
  margin-bottom:.6rem;
}
.hrv-chart-title{font-size:.78rem;font-weight:600;color:var(--text);margin-bottom:.75rem;display:flex;justify-content:space-between}
.hrv-baseline-pill{
  font-size:.68rem;color:var(--text3);
  background:var(--dark3);border-radius:10px;padding:.15rem .5rem;
}
canvas{width:100%!important;max-height:100px}

/* ── LOADING ── */
.loading{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:.85rem}
.spinner{
  width:24px;height:24px;border:2px solid var(--border);
  border-top-color:var(--ice);border-radius:50%;
  animation:spin .8s linear infinite;margin:0 auto 1rem;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- ═══════════ LOGIN ═══════════ -->
<div id="login-screen">
  <div class="login-logo">
    <div class="login-dot"></div>
    <div class="login-title">NPC ENDURANCE</div>
    <div class="login-sub">Portal do Atleta</div>
  </div>
  <div class="login-card">
    <div class="login-label">Digite seu PIN de 4 dígitos</div>
    <div class="pin-dots">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>

      <button class="pin-btn" onclick="pinPress('1')">1</button>
      <button class="pin-btn" onclick="pinPress('2')">2</button>
      <button class="pin-btn" onclick="pinPress('3')">3</button>
      <button class="pin-btn" onclick="pinPress('4')">4</button>
      <button class="pin-btn" onclick="pinPress('5')">5</button>
      <button class="pin-btn" onclick="pinPress('6')">6</button>
      <button class="pin-btn" onclick="pinPress('7')">7</button>
      <button class="pin-btn" onclick="pinPress('8')">8</button>

<!-- ═══════════ APP ═══════════ -->
<div id="app">

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-avatar" id="app-avatar">?</div>
    <div>
      <div class="topbar-name" id="app-name">Atleta</div>
      <div class="topbar-meta" id="app-meta">NPC Endurance</div>
    </div>
    <button class="topbar-logout" onclick="logout()">Sair</button>
  </div>

  <!-- Tab: HOJE -->
  <div class="tab-content active" id="tab-hoje">
    <div class="content">
      <div id="hoje-body"><div class="loading"><div class="spinner"></div>Carregando...</div></div>
    </div>
  </div>

  <!-- Tab: NUTRIÇÃO -->
  <div class="tab-content" id="tab-nutri">
    <div class="content">
      <div id="nutri-body"><div class="loading"><div class="spinner"></div>Carregando...</div></div>
    </div>
  </div>

  <!-- Tab: FORMA -->
  <div class="tab-content" id="tab-forma">
    <div class="content">
      <div id="forma-body"><div class="loading"><div class="spinner"></div>Carregando...</div></div>
    </div>
  </div>

  <!-- Bottom nav -->
  <div class="bottom-nav">
    <button class="nav-item active" id="nav-hoje" onclick="switchTab('hoje')">
      <span class="nav-icon">📅</span>Hoje
    </button>
    <button class="nav-item" id="nav-nutri" onclick="switchTab('nutri')">
      <span class="nav-icon">🥗</span>Nutrição
    </button>
    <button class="nav-item" id="nav-forma" onclick="switchTab('forma')">
      <span class="nav-icon">📈</span>Forma
    </button>
  </div>

</div>

// Base meals (Monah Dias)

// PIN

function pinPress(d) {
  if (pin.length >= 4) return;
  pin += d;
  document.getElementById('pd'+(pin.length-1)).classList.add('filled');
  if (pin.length === 4) setTimeout(tryLogin, 120);
}
function pinDel() {
  if (!pin.length) return;
  document.getElementById('pd'+(pin.length-1)).classList.remove('filled');
  pin = pin.slice(0,-1);
  document.getElementById('pin-error').textContent = '';
}
function tryLogin() {
  if (ATHLETES[pin]) {
    athlete = ATHLETES[pin];
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    document.getElementById('app-avatar').textContent = athlete.initials;
    document.getElementById('app-name').textContent = athlete.name;
    loadData();
  } else {
    document.getElementById('pin-error').textContent = 'PIN incorreto. Tente novamente.';
    setTimeout(() => {
      pin = '';
      for(let i=0;i<4;i++) document.getElementById('pd'+i).classList.remove('filled');
    }, 600);
  }
}
function logout() {
  pin = '';
  athlete = null;
  data = null;
  for(let i=0;i<4;i++) document.getElementById('pd'+i).classList.remove('filled');
  document.getElementById('pin-error').textContent = '';
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').style.display = 'flex';

}

// ──────────────────────────────────────────────────────────
// CLASSIFY DAY
// ──────────────────────────────────────────────────────────
function classifyDay(sessions) {
  if (!sessions || !sessions.length) return 'rest';
  const titles = sessions.map(s => (s.desc||'').toLowerCase()).join(' ');
  const n = sessions.length;
  const dur = sessions.reduce((a,s) => {
    const m = s.dur || '';
    const h = (m.match(/(\d+)h/) || [0,0])[1];
    const mn = (m.match(/(\d+)min/) || [0,0])[1];
    return a + (+h)*60 + (+mn);
  }, 0);
  const isDT = /duplo|dt1|dt2|limiar|threshold/.test(titles);
  const isVO2 = /vo2|z3|intervalado/.test(titles);
  if (n >= 2 && isDT) return 'double';
  if (isVO2) return 'vo2max';
  if (isDT) return 'threshold';
  if (dur > 180) return 'long';
  if (dur > 90) return 'long';
  return 'easy';
}

// ──────────────────────────────────────────────────────────
// TODAY'S SESSIONS

function getTodaySessions(ath) {
  if (!ath || !ath.sessions) return [];
  const today = DAY_PT[new Date().getDay()];
  return ath.sessions.filter(s => s.day === today);
}

function buildForma() {
  const ath = getAthleteData();

    document.getElementById('forma-body').innerHTML =
      '<div class="loading">Dados não disponíveis.</div>';
    return;
  }
  const kpis = ath.kpis || {};
  const delta = ath.kpi_delta || {};
  const pmc = ath.pmc || {};

  const tsb = kpis.tsb || 0;

                    tsb >= -10 ? 'Treinamento produtivo — monitorar' :
                    tsb >= -20 ? 'Fadiga moderada' : 'Fadiga alta — priorizar recuperação';

  let html = '';

  // PMC
  html += `
    <div class="sec-title" style="margin-top:.75rem">Performance Management Chart</div>
    <div class="pmc-row">
      <div class="pmc-card">
        <div class="pmc-val" style="color:var(--ice)">${Math.round(kpis.ctl||0)}</div>
        <div class="pmc-lbl">CTL · Fitness</div>
        <div class="pmc-delta ${deltaClass(delta.ctl)}">${delta.ctl||'—'} esta semana</div>
      </div>
      <div class="pmc-card">
        <div class="pmc-val" style="color:var(--fire)">${Math.round(kpis.atl||0)}</div>
        <div class="pmc-lbl">ATL · Fadiga</div>
        <div class="pmc-delta ${deltaClass(delta.atl)}">${delta.atl||'—'} esta semana</div>
      </div>
      <div class="pmc-card">
        <div class="pmc-val" style="color:${tsbColor}">${tsb >= 0 ? '+' : ''}${Math.round(tsb)}</div>
        <div class="pmc-lbl">TSB · Forma</div>
        <div class="pmc-delta ${deltaClass(delta.tsb)}">${delta.tsb||'—'} esta semana</div>
      </div>
    </div>
    <div style="background:${tsbColor}18;border:1px solid ${tsbColor}30;border-radius:8px;padding:.6rem .9rem;font-size:.8rem;color:${tsbColor};margin-bottom:.5rem">
      ${tsbStatus}
    </div>`;

  // HRV chart
  if (hrv.vals && hrv.vals.length) {
    html += `
      <div class="sec-title">HRV — últimos 14 dias</div>
      <div class="hrv-chart-wrap">
        <div class="hrv-chart-title">
          <span>Variabilidade de FC (RMSSD)</span>
          <span class="hrv-baseline-pill">Baseline: ${hrv.baseline||'—'} ms</span>
        </div>
        <canvas id="hrv-canvas" height="100"></canvas>
      </div>`;
  }

  // Adherence
  if (adherence.length) {
    html += '<div class="sec-title">Aderência ao plano</div>';
    adherence.forEach(a => {
      const pct = a.target > 0 ? Math.min(Math.round(a.done/a.target*100), 100) : 0;
      html += `
        <div style="background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:.75rem 1rem;margin-bottom:.5rem">
          <div style="display:flex;justify-content:space-between;margin-bottom:.5rem;font-size:.82rem">
            <span style="font-weight:600">${a.label}</span>
            <span style="color:var(--text2)">${a.done}h / ${a.target}h · <span style="color:${a.color};font-weight:700">${pct}%</span></span>
          </div>
          <div style="background:var(--border2);border-radius:4px;height:6px;overflow:hidden">
            <div style="height:100%;width:${pct}%;background:${a.color};border-radius:4px;transition:width .5s"></div>
          </div>
        </div>`;
    });
  }

  // Sessions summary
  html += `<div class="sec-title">Sessões da semana</div>`;
  if (ath.sessions && ath.sessions.length) {
    ath.sessions.forEach(s => {
      const icon = SPORT_ICON[s.sport] || '🏋️';
      const color = SPORT_COLOR[s.sport] || 'var(--ice)';
      html += `
        <div class="session-card" style="--sport-color:${color}">
          <div class="session-top">
            <div class="session-sport-icon">${icon}</div>
            <div class="session-info">
              <div class="session-title">${s.day} · ${s.desc||'—'}</div>
              <div class="session-meta">${s.dur||''} ${s.tss ? '· TSS ' + s.tss : ''} ${s.zones && s.zones !== '—' ? '· Z:' + s.zones : ''}</div>
            </div>
          </div>
        </div>`;
    });
  } else {
    html += '<div style="color:var(--text3);font-size:.82rem;text-align:center;padding:1.5rem">Nenhuma sessão registrada esta semana</div>';
  }

  document.getElementById('forma-body').innerHTML = html;

  // Draw HRV chart after DOM update
  if (hrv.vals && hrv.vals.length) {
    setTimeout(() => {
      if (chartHRV) { chartHRV.destroy(); chartHRV = null; }
      const ctx = document.getElementById('hrv-canvas');
      if (!ctx) return;
      const baseline = hrv.baseline || 0;
      chartHRV = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: hrv.labels || [],
          datasets: [
            {
              label: 'HRV',
              data: hrv.vals,
              backgroundColor: hrv.vals.map(v =>
                v >= baseline * 0.97 ? 'rgba(46,204,113,.6)' :
                v >= baseline * 0.90 ? 'rgba(243,156,18,.6)' : 'rgba(231,76,60,.6)'
              ),
              borderRadius: 3,
              order: 2,
            },
            {
              label: 'Baseline',
              data: Array(hrv.vals.length).fill(baseline),
              type: 'line',
              borderColor: 'rgba(255,255,255,.25)',
              borderWidth: 1.5,
              borderDash: [4,3],
              pointRadius: 0,
              fill: false,
              order: 1,
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false },
            tooltip: { callbacks: { label: c => `HRV: ${c.raw} ms` } }
          },
          scales: {
            x: { grid: { display: false }, ticks: { color: '#4a6278', font: { size: 9 }, maxTicksLimit: 7 } },
            y: { grid: { color: 'rgba(74,155,190,.06)' }, ticks: { color: '#4a6278', font: { size: 9 } } }
          }
        }
      });
    }, 50);
  }
}

// HELPERS

function deltaClass(d) {
  if (!d || d === '0') return 'delta-nt';
  return d.startsWith('+') ? 'delta-up' : 'delta-dn';
}

function getNextEvent() {
  // Hardcoded known events (from data loaded in context)
  const evts = {

function switchTab(id) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  document.getElementById('nav-'+id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
